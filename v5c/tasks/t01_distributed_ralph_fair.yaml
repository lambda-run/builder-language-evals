id: t01_distributed_ralph_fair
name: "Distributed Ralph loop spec — tight comparison across all formats"
domain: agent_orchestration_deep

# Fair-comparison version: every format is hand-tightened to its minimum
# expressive form. v5b only tightened builder; this version tightens all
# three so the comparison is apples-to-apples. Per Gemini's adversarial
# review of the v5b confound.

builder: |
  DistributedRalph
    .pool(6 implementer on "sonnet-4.6", 1 reviewer on "opus-4.7", max 2 per repo)
    .backlog("fix_plan.md" in "github.com/lambda-run/ops")
        .claim(branch lock, 10m ttl)
        .release(on merge, abandon, or ttl expiry)
    .protocol
        .conflict(last write wins after rebase)
        .escalate(3 rebase conflicts to reviewer pool)
        .gossip("slack:#ralph-bus" on claim, merge, block)
    .loop(while backlog has open tasks)
        .stop_if(budget > $50, kill switch, error rate > 30%)
    .on_crash(release claims, requeue with retry++, max 3 then park for human)
    .observe(claim, commit, fail to "loki")
        .metrics(success rate, p50 task seconds, claim contention)
        .surface(error rate > 20% or queue stuck > 30m)
    .terminate(backlog empty or budget exhausted or human signals done)

markdown: |
  # Distributed Ralph

  ## Pool
  - 6 implementer (`sonnet-4.6`), 1 reviewer (`opus-4.7`), max 2 per repo

  ## Backlog
  - `fix_plan.md` in `github.com/lambda-run/ops`
  - Claim: branch lock, 10m TTL
  - Release on: merge, abandon, TTL expiry

  ## Protocol
  - Conflict: last-write-wins after rebase
  - Escalate after 3 rebase conflicts to reviewer pool
  - Gossip claim/merge/block to `slack:#ralph-bus`

  ## Loop
  - Continue while backlog has open tasks
  - Stop if: budget > $50, kill switch, error rate > 30%

  ## Crash
  - Release claims, requeue with retry++
  - Max 3 retries, then park for human

  ## Observability
  - Log claim/commit/fail to loki
  - Metrics: success rate, p50 task seconds, claim contention
  - Surface when error rate > 20% or queue stuck > 30m

  ## Termination
  - Backlog empty, budget exhausted, or human signals done

prose: |
  A distributed ralph loop. 6 implementer agents on sonnet-4.6 plus 1 reviewer on opus-4.7, max 2 agents per repo to avoid file-lock thrash, pull tasks from fix_plan.md in github.com/lambda-run/ops. Each agent claims via atomic branch lock with 10m TTL; release on merge, abandon, or TTL expiry. Conflicts resolve last-write-wins after rebase; 3 rebase conflicts escalates a task to the reviewer pool. Gossip claim, merge, and block events to slack:#ralph-bus. Loop continues while backlog has open tasks; stops on budget > $50, kill switch, or error rate > 30%. On worker crash, release claims and requeue with retry++; after 3 retries park for human. Log claim/commit/fail events to loki; track success rate, p50 task seconds, claim contention; surface to human when error rate > 20% or queue stuck > 30m. Terminate on backlog empty, budget exhausted, or human signals done.

