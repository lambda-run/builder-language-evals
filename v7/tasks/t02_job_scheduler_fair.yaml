id: t02_job_scheduler_fair
name: "Job scheduler — fair comparison (all 3 formats hand-tightened)"
domain: code_artifact_complex

# Fair-comparison v7 task. Same content as t02_job_scheduler.yaml but with
# every format hand-tightened to its minimum expressive form, so the
# format-effect on agent output isn't confounded by baseline verbosity.

builder: |
  Job(id: str, priority: int, deps: list[str], func: Callable[[], None] raises on failure)

  JobScheduler
    .submit(job, silent no-op if id already submitted)
    .run
        .order(by deps, then priority desc at same ready level)
        .cycle(raise CycleError if deps form a cycle)
    .retry(max 3 attempts per job, exponential backoff: sleep 0s, 0.1s, 0.4s before attempts 1,2,3)
    .on_fail(after all 3 retries raise, mark transitive downstream as "blocked", never attempted)
    .status(job_id)
        .returns("pending" | "running" | "retrying" | "succeeded" | "failed" | "blocked")

markdown: |
  # JobScheduler

  ## Job (dataclass / namedtuple)
  - `id: str`, `priority: int` (higher = first among ready siblings), `deps: list[str]`, `func: Callable[[], None]` (raises on failure)

  ## API
  - `submit(job)` — silent no-op on duplicate id
  - `run()` — execute all submitted jobs
  - `status(job_id) -> str`

  ## Run order
  - After all deps `succeeded`; among ready siblings, priority desc

  ## Cycle
  - Submitted cycle → `run()` raises `CycleError`

  ## Retry
  - Max 3 attempts, sleep 0s / 0.1s / 0.4s before attempts 1/2/3
  - `succeeded` on first non-raising attempt; `failed` after all 3 raise

  ## Block propagation
  - On `failed`, transitive downstream → `blocked`, never attempted

  ## Status strings (exact)
  `pending`, `running`, `retrying`, `succeeded`, `failed`, `blocked`

  ## Error types
  Raise `CycleError` on dep cycles.

prose: |
  Implement JobScheduler. Job is a dataclass with id (str), priority (int, higher = run first among ready siblings), deps (list of job ids), and func (callable, raises on failure). API: submit(job) is a silent no-op on duplicate id; run() executes all jobs; status(job_id) returns the current state. Run order: a job runs only after all its deps are succeeded; among ready siblings, sort by priority descending. If submitted jobs form a dep cycle, run() raises CycleError. Retry policy: each job gets up to 3 attempts with sleep(0), sleep(0.1), sleep(0.4) before attempts 1, 2, 3 respectively; succeeded on the first non-raising attempt; failed after all 3 raise. When a job is failed, every transitive downstream job is marked blocked and never attempted. Status strings (exact): pending, running, retrying, succeeded, failed, blocked.

# Same gold tests as t02_job_scheduler.yaml — included verbatim so this task
# is self-contained.
gold_tests: |
  import time
  from job_scheduler import JobScheduler, Job, CycleError

  results = []
  def check(name, ok, info=""):
      results.append((name, bool(ok), info))

  def succeed():
      pass
  class Counter:
      def __init__(self, fail_n_times):
          self.n = fail_n_times
          self.calls = 0
      def __call__(self):
          self.calls += 1
          if self.calls <= self.n:
              raise RuntimeError(f"fail #{self.calls}")

  call_log = []
  def make_logger(label):
      def f():
          call_log.append(label)
      return f

  s = JobScheduler(); s.run()
  check("empty run does not raise", True)

  s = JobScheduler()
  s.submit(Job(id="a", priority=0, deps=[], func=succeed))
  s.run()
  check("single job succeeds", s.status("a") == "succeeded", s.status("a"))

  s = JobScheduler(); call_log.clear()
  s.submit(Job(id="a", priority=0, deps=[], func=make_logger("a")))
  s.submit(Job(id="b", priority=0, deps=["a"], func=make_logger("b")))
  s.run()
  check("A runs before B (dep order)", call_log == ["a", "b"], str(call_log))

  s = JobScheduler(); call_log.clear()
  s.submit(Job(id="lo", priority=1, deps=[], func=make_logger("lo")))
  s.submit(Job(id="hi", priority=10, deps=[], func=make_logger("hi")))
  s.submit(Job(id="mid", priority=5, deps=[], func=make_logger("mid")))
  s.run()
  check("priority desc at same level", call_log == ["hi", "mid", "lo"], str(call_log))

  s = JobScheduler()
  s.submit(Job(id="a", priority=0, deps=["b"], func=succeed))
  s.submit(Job(id="b", priority=0, deps=["a"], func=succeed))
  raised = False
  try: s.run()
  except CycleError: raised = True
  check("cycle raises CycleError", raised)

  s = JobScheduler()
  c = Counter(fail_n_times=2)
  s.submit(Job(id="a", priority=0, deps=[], func=c))
  s.run()
  check("retry succeeds on 3rd attempt", s.status("a") == "succeeded" and c.calls == 3, f"status={s.status('a')} calls={c.calls}")

  s = JobScheduler()
  c = Counter(fail_n_times=99)
  s.submit(Job(id="a", priority=0, deps=[], func=c))
  s.run()
  check("retry exhaust → failed after 3 attempts", s.status("a") == "failed" and c.calls == 3, f"status={s.status('a')} calls={c.calls}")

  s = JobScheduler()
  c = Counter(fail_n_times=99)
  s.submit(Job(id="a", priority=0, deps=[], func=c))
  t0 = time.time(); s.run(); elapsed = time.time() - t0
  check("backoff total ~0.5s for 3 fails", 0.4 <= elapsed <= 1.0, f"elapsed={elapsed:.3f}s")

  s = JobScheduler()
  s.submit(Job(id="a", priority=0, deps=[], func=Counter(99)))
  s.submit(Job(id="b", priority=0, deps=["a"], func=succeed))
  s.run()
  check("downstream of failed job is blocked", s.status("a") == "failed" and s.status("b") == "blocked", f"a={s.status('a')} b={s.status('b')}")

  s = JobScheduler()
  s.submit(Job(id="a", priority=0, deps=[], func=Counter(99)))
  s.submit(Job(id="b", priority=0, deps=["a"], func=succeed))
  s.submit(Job(id="c", priority=0, deps=["b"], func=succeed))
  s.run()
  check("transitive block (A fail → B blocked → C blocked)", s.status("c") == "blocked", s.status("c"))

  s = JobScheduler(); call_log.clear()
  s.submit(Job(id="a", priority=0, deps=[], func=make_logger("a")))
  s.submit(Job(id="a", priority=99, deps=[], func=make_logger("a-dup")))
  s.run()
  check("submit same id twice → runs once", call_log == ["a"], str(call_log))

  s = JobScheduler(); call_log.clear()
  s.submit(Job(id="a", priority=0, deps=[], func=make_logger("a")))
  s.submit(Job(id="b", priority=0, deps=["a"], func=make_logger("b")))
  s.submit(Job(id="c", priority=0, deps=["a"], func=make_logger("c")))
  s.submit(Job(id="d", priority=0, deps=["b", "c"], func=make_logger("d")))
  s.run()
  check("diamond — D runs last", call_log[0] == "a" and call_log[-1] == "d" and set(call_log[1:3]) == {"b","c"}, str(call_log))

  s = JobScheduler()
  s.submit(Job(id="a", priority=0, deps=[], func=succeed))
  s.submit(Job(id="b", priority=0, deps=[], func=Counter(99)))
  s.submit(Job(id="c", priority=0, deps=["b"], func=succeed))
  s.run()
  check("status uses exact strings", s.status("a") == "succeeded" and s.status("b") == "failed" and s.status("c") == "blocked",
        f"a={s.status('a')} b={s.status('b')} c={s.status('c')}")

  s = JobScheduler()
  for i in range(5):
      s.submit(Job(id=f"j{i}", priority=0, deps=[], func=succeed))
  s.run()
  check("5 independent jobs all succeed", all(s.status(f"j{i}") == "succeeded" for i in range(5)))

  s = JobScheduler(); call_log.clear()
  prev = None
  for i in range(5):
      s.submit(Job(id=f"j{i}", priority=0, deps=[prev] if prev else [], func=make_logger(f"j{i}")))
      prev = f"j{i}"
  s.run()
  check("long chain in order", call_log == [f"j{i}" for i in range(5)], str(call_log))

  passed = sum(1 for _, ok, _ in results if ok)
  total = len(results)
  print(f"PASS_COUNT={passed}/{total}")
  for name, ok, info in results:
      tag = "PASS" if ok else "FAIL"
      print(f"  {tag}: {name}" + (f" — {info}" if not ok else ""))
